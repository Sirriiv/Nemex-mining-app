<div class="section home-section active" id="home-section">
    <!-- Mining Coin Section -->
    <div class="mining-section">
        <div class="coin-container">
            <div class="mining-coin" id="miningCoin">
                NMX
            </div>
        </div>
        
        <!-- Countdown Timer -->
        <div class="countdown-container">
            <div class="timer-label">Claim in</div>
            <div class="timer-display" id="countdownTimer">24:00:00</div>
        </div>
        
        <!-- Claim Button -->
        <button class="claim-button" id="claimButton" disabled>
            Claim Your NMX
        </button>
    </div>

    <!-- Current Balance Section -->
    <div class="balance-section">
        <div class="balance-label">Your NMX Balance</div>
        <div class="balance-amount" id="currentBalance">30 NMX</div>
        <div class="balance-label">≈ $0.00 USD</div>
    </div>

    <!-- Quick Stats -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">Mining Statistics</div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="totalMined">30</div>
                <div class="stat-label">Total Mined</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="miningRate">1.25</div>
                <div class="stat-label">NMX/Hour</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="referralBonus">0</div>
                <div class="stat-label">Referral Bonus</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalClaims">1</div>
                <div class="stat-label">Total Claims</div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">Quick Actions</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn btn-outline" onclick="loadSection('tasks')">
                <span style="font-size: 18px; margin-right: 8px;">📋</span>
                Tasks
            </button>
            <button class="btn btn-outline" onclick="loadSection('referrals')">
                <span style="font-size: 18px; margin-right: 8px;">👥</span>
                Refer Friends
            </button>
        </div>
    </div>
</div>
