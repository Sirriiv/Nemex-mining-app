<section class="dashboard-section" id="home-section">
    <div class="balance-card gold-glow">
        <div class="balance-label">Your NMXp Balance</div>
        <div class="balance-amount" id="balanceAmount">00</div>
        
        <!-- NemexCoin Logo -->
        <div class="nemex-logo">
            <div class="logo-container">
                <div class="logo-base">
                    <div class="logo-center">
                        <div class="infinity-symbol"></div>
                    </div>
                    <div class="circuit-lines">
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                    </div>
                </div>
                <div class="logo-glow"></div>
            </div>
        </div>
        
        <div class="mining-timer" id="miningTimer">Claim in 24:00:00</div>
        <button class="claim-btn" id="claimButton" disabled>30 NMXp</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalMined">0</div>
            <div class="stat-label">Total Mined</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="miningDays">1</div>
            <div class="stat-label">Mining Days</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="referralCount">0</div>
            <div class="stat-label">Referrals</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="tasksCompleted">0</div>
            <div class="stat-label">Tasks Done</div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <h3>Quick Actions</h3>
        <div class="quick-actions-grid">
            <button class="quick-action-btn" onclick="window.navigation.navigateTo('tasks')">
                <div class="quick-action-icon">📋</div>
                <div class="quick-action-label">Daily Tasks</div>
            </button>
            <button class="quick-action-btn" onclick="window.navigation.navigateTo('referrals')">
                <div class="quick-action-icon">👥</div>
                <div class="quick-action-label">Invite Friends</div>
            </button>
            <button class="quick-action-btn" onclick="window.navigation.navigateTo('buy')">
                <div class="quick-action-icon">🛒</div>
                <div class="quick-action-label">Buy NMXp</div>
            </button>
            <button class="quick-action-btn" onclick="showProfileModal()">
                <div class="quick-action-icon">👤</div>
                <div class="quick-action-label">My Profile</div>
            </button>
        </div>
    </div>
</section>

<!-- Rest of the modals and scripts remain the same -->
