<section class="dashboard-section" id="wallet-section">
    <div class="section-header">
        <h2>💰 Wallet</h2>
        <p>Manage your NMXp assets and transaction history</p>
    </div>

    <div class="wallet-balance">
        <div class="balance-card gold-glow">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount" id="walletBalance">00</div>
            <div class="balance-subtitle">NMXp Tokens</div>
        </div>
    </div>

    <div class="wallet-actions">
        <h3>Quick Actions</h3>
        <div class="actions-grid">
            <button class="wallet-action-btn" onclick="showSendModal()">
                <div class="action-icon">📤</div>
                <div class="action-label">Send</div>
            </button>
            <button class="wallet-action-btn" onclick="showReceiveModal()">
                <div class="action-icon">📥</div>
                <div class="action-label">Receive</div>
            </button>
            <button class="wallet-action-btn" onclick="window.navigation.navigateTo('buy')">
                <div class="action-icon">🛒</div>
                <div class="action-label">Buy More</div>
            </button>
            <button class="wallet-action-btn" onclick="showSwapModal()">
                <div class="action-icon">🔄</div>
                <div class="action-label">Swap</div>
            </button>
        </div>
    </div>

    <div class="transaction-history">
        <h3>Recent Transactions</h3>
        <div class="transactions-list" id="transactionsList">
            <div class="transaction-item">
                <div class="transaction-icon">💰</div>
                <div class="transaction-details">
                    <div class="transaction-title">Daily Mining Reward</div>
                    <div class="transaction-date">Today, 12:00 PM</div>
                </div>
                <div class="transaction-amount positive">+30 NMXp</div>
            </div>
            
            <div class="transaction-item">
                <div class="transaction-icon">📋</div>
                <div class="transaction-details">
                    <div class="transaction-title">Task Completion</div>
                    <div class="transaction-date">Yesterday, 3:45 PM</div>
                </div>
                <div class="transaction-amount positive">+10 NMXp</div>
            </div>
            
            <div class="transaction-item">
                <div class="transaction-icon">👥</div>
                <div class="transaction-details">
                    <div class="transaction-title">Referral Bonus</div>
                    <div class="transaction-date">2 days ago</div>
                </div>
                <div class="transaction-amount positive">+50 NMXp</div>
            </div>
        </div>
    </div>
</section>

<style>
.wallet-actions {
    margin-bottom: 25px;
}

.wallet-actions h3 {
    color: var(--gold);
    margin: 25px 0 20px 0;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.actions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.wallet-action-btn {
    background: var(--darker-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 15px;
    padding: 20px 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
}

.wallet-action-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.wallet-action-btn:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
}

.action-icon {
    font-size: 24px;
    height: 30px;
}

.action-label {
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.transaction-history h3 {
    color: var(--gold);
    margin: 25px 0 20px 0;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.transactions-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.transaction-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    background: var(--darker-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 15px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.transaction-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.transaction-item:hover {
    border-color: var(--gold);
    transform: translateX(5px);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
}

.transaction-icon {
    font-size: 20px;
    width: 50px;
    height: 50px;
    background: rgba(212, 175, 55, 0.1);
    border: 2px solid var(--gold);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.transaction-details {
    flex: 1;
}

.transaction-title {
    color: var(--text);
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 15px;
}

.transaction-date {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
}

.transaction-amount {
    font-weight: 800;
    font-size: 16px;
    text-align: right;
}

.transaction-amount.positive {
    color: #2ecc71;
    text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
}

.transaction-amount.negative {
    color: #e74c3c;
    text-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
}

.balance-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Modal Styles */
.wallet-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    padding: 20px;
}

.modal-dialog {
    background: var(--darker-bg);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

.modal-dialog::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
}

.modal-header h2 {
    color: var(--gold);
    margin: 0;
    font-size: 20px;
    font-weight: 700;
}

.modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
    padding: 5px;
    border-radius: 5px;
    transition: all 0.3s;
}

.modal-close:hover {
    color: var(--gold);
    background: rgba(212, 175, 55, 0.1);
}

.modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 25px;
}

.modal-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.modal-btn.primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--darker-bg);
}

.modal-btn.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(212, 175, 55, 0.3);
}

.modal-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
}

/* Form Styles */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px 15px;
    background: var(--dark-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    transition: all 0.3s;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
}

.wallet-address {
    background: var(--dark-bg);
    padding: 15px;
    border-radius: 10px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    margin-bottom: 20px;
    word-break: break-all;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: var(--gold);
    text-align: center;
}

/* Swap Styles */
.swap-container {
    margin-bottom: 20px;
}

.swap-from,
.swap-to {
    margin-bottom: 15px;
}

.swap-from label,
.swap-to label {
    color: var(--text);
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
}

.token-selector {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.token-selector select {
    flex: 1;
    padding: 12px;
    background: var(--dark-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    color: var(--text);
}

.token-selector input {
    flex: 2;
    padding: 12px;
    background: var(--dark-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    color: var(--text);
}

.swap-arrow {
    text-align: center;
    margin: 15px 0;
    font-size: 24px;
    color: var(--gold);
}

.swap-info {
    background: var(--dark-bg);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
}

.info-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 14px;
}

.info-item:last-child {
    margin-bottom: 0;
}

.info-item span:first-child {
    color: var(--muted);
}

.info-item span:last-child {
    color: var(--text);
    font-weight: 600;
}

/* Transaction Details */
.transaction-details-modal .detail-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.1);
}

.detail-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
}

.detail-item span:first-child {
    color: var(--muted);
    font-weight: 600;
}

.detail-item span:last-child {
    color: var(--text);
    font-weight: 600;
    text-align: right;
}
</style>

<script>
let currentModal = null;

function showSendModal() {
    const modalHTML = `
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Send NMXp</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content">
                <div class="form-group">
                    <label for="sendAddress">Recipient Address</label>
                    <input type="text" id="sendAddress" placeholder="Enter NMX wallet address">
                </div>
                <div class="form-group">
                    <label for="sendAmount">Amount (NMXp)</label>
                    <input type="number" id="sendAmount" placeholder="0.00" min="1">
                </div>
                <div class="form-group">
                    <label for="sendNote">Note (Optional)</label>
                    <input type="text" id="sendNote" placeholder="Add a note">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                    <button class="modal-btn primary" onclick="confirmSend()">Send</button>
                </div>
            </div>
        </div>
    `;
    showModal(modalHTML);
}

function showReceiveModal() {
    const address = 'NMX' + Date.now().toString().slice(-8) + 'WALLET';
    const modalHTML = `
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Receive NMXp</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content" style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 15px; color: var(--gold);">📬</div>
                <h3 style="color: var(--gold); margin-bottom: 15px;">Your Wallet Address</h3>
                <div class="wallet-address">${address}</div>
                <button class="modal-btn primary" onclick="copyWalletAddress('${address}')">
                    Copy Address
                </button>
                <div style="margin-top: 15px; color: var(--muted); font-size: 12px;">
                    Share this address to receive NMXp tokens
                </div>
            </div>
        </div>
    `;
    showModal(modalHTML);
}

function showSwapModal() {
    const modalHTML = `
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Swap Tokens</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content">
                <div class="swap-container">
                    <div class="swap-from">
                        <label>From</label>
                        <div class="token-selector">
                            <select>
                                <option>NMXp</option>
                                <option>BTC</option>
                                <option>ETH</option>
                                <option>USDT</option>
                            </select>
                            <input type="number" placeholder="0.00" min="0">
                        </div>
                    </div>
                    <div class="swap-arrow">⇅</div>
                    <div class="swap-to">
                        <label>To</label>
                        <div class="token-selector">
                            <select>
                                <option>USDT</option>
                                <option>BTC</option>
                                <option>ETH</option>
                                <option>NMXp</option>
                            </select>
                            <input type="number" placeholder="0.00" readonly>
                        </div>
                    </div>
                </div>
                <div class="swap-info">
                    <div class="info-item">
                        <span>Exchange Rate</span>
                        <span>1 NMXp = 0.10 USDT</span>
                    </div>
                    <div class="info-item">
                        <span>Network Fee</span>
                        <span>1 NMXp</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                    <button class="modal-btn primary" onclick="confirmSwap()">Swap</button>
                </div>
            </div>
        </div>
    `;
    showModal(modalHTML);
}

function showTransactionDetails(transactionId) {
    const transaction = {
        id: transactionId,
        title: 'Daily Mining Reward',
        amount: 30,
        date: new Date().toISOString(),
        type: 'mining_reward',
        status: 'completed'
    };
    
    const modalHTML = `
        <div class="modal-dialog transaction-details-modal">
            <div class="modal-header">
                <h2>Transaction Details</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content">
                <div class="detail-item">
                    <span>Type:</span>
                    <span>${transaction.title}</span>
                </div>
                <div class="detail-item">
                    <span>Amount:</span>
                    <span style="color: #2ecc71;">+${transaction.amount} NMXp</span>
                </div>
                <div class="detail-item">
                    <span>Date:</span>
                    <span>${new Date(transaction.date).toLocaleString()}</span>
                </div>
                <div class="detail-item">
                    <span>Status:</span>
                    <span style="color: #2ecc71;">Completed</span>
                </div>
                <div class="detail-item">
                    <span>Transaction ID:</span>
                    <span style="font-family: monospace; font-size: 12px;">TX${transaction.id.toString().padStart(8, '0')}</span>
                </div>
            </div>
        </div>
    `;
    showModal(modalHTML);
}

function showModal(html) {
    closeModal(); // Close any existing modal
    
    const modal = document.createElement('div');
    modal.className = 'wallet-modal';
    modal.innerHTML = html;
    document.body.appendChild(modal);
    currentModal = modal;
    
    // Add click outside to close
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
}

function closeModal() {
    if (currentModal) {
        currentModal.remove();
        currentModal = null;
    }
}

function copyWalletAddress(address) {
    navigator.clipboard.writeText(address).then(() => {
        alert('Wallet address copied to clipboard!');
        closeModal();
    });
}

function confirmSend() {
    alert('Send functionality would be implemented here');
    closeModal();
}

function confirmSwap() {
    alert('Swap functionality would be implemented here');
    closeModal();
}

// Add click handlers to transaction items
document.addEventListener('DOMContentLoaded', function() {
    const transactionItems = document.querySelectorAll('.transaction-item');
    transactionItems.forEach(item => {
        item.addEventListener('click', function() {
            const transactionId = this.getAttribute('data-id') || 1;
            showTransactionDetails(transactionId);
        });
    });
});
</script>
