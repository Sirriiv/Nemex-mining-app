<section class="dashboard-section" id="wallet-section">
    <div class="section-header">
        <h2>💰 Wallet</h2>
        <p>Manage your NMXp assets and transaction history</p>
    </div>

    <div class="wallet-balance">
        <div class="balance-card">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount" id="walletBalance">00</div>
            <div class="balance-subtitle">NMXp Tokens</div>
        </div>
    </div>

    <div class="wallet-actions">
        <h3 style="color: var(--gold); margin: 25px 0 15px 0;">Quick Actions</h3>
        <div class="actions-grid">
            <button class="wallet-action-btn" onclick="showSendModal()">
                <div class="action-icon">📤</div>
                <div class="action-label">Send</div>
            </button>
            <button class="wallet-action-btn" onclick="showReceiveModal()">
                <div class="action-icon">📥</div>
                <div class="action-label">Receive</div>
            </button>
            <button class="wallet-action-btn" onclick="window.navigation.navigateTo('buy')">
                <div class="action-icon">🛒</div>
                <div class="action-label">Buy More</div>
            </button>
            <button class="wallet-action-btn" onclick="showSwapModal()">
                <div class="action-icon">🔄</div>
                <div class="action-label">Swap</div>
            </button>
        </div>
    </div>

    <div class="transaction-history">
        <h3 style="color: var(--gold); margin: 25px 0 15px 0;">Recent Transactions</h3>
        <div class="transactions-list" id="transactionsList">
            <div class="transaction-item">
                <div class="transaction-icon">💰</div>
                <div class="transaction-details">
                    <div class="transaction-title">Daily Mining Reward</div>
                    <div class="transaction-date">Today, 12:00 PM</div>
                </div>
                <div class="transaction-amount positive">+30 NMXp</div>
            </div>
            
            <div class="transaction-item">
                <div class="transaction-icon">📋</div>
                <div class="transaction-details">
                    <div class="transaction-title">Task Completion</div>
                    <div class="transaction-date">Yesterday, 3:45 PM</div>
                </div>
                <div class="transaction-amount positive">+10 NMXp</div>
            </div>
            
            <div class="transaction-item">
                <div class="transaction-icon">👥</div>
                <div class="transaction-details">
                    <div class="transaction-title">Referral Bonus</div>
                    <div class="transaction-date">2 days ago</div>
                </div>
                <div class="transaction-amount positive">+50 NMXp</div>
            </div>
        </div>
    </div>
</section>

<style>
.wallet-actions {
    margin-bottom: 25px;
}

.actions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.wallet-action-btn {
    background: var(--darker-bg);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 15px 10px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.wallet-action-btn:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
}

.transaction-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    background: var(--darker-bg);
    border: 1px solid #333;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.transaction-item:hover {
    border-color: var(--gold);
    transform: translateX(5px);
}

.transaction-icon {
    font-size: 20px;
    width: 40px;
    height: 40px;
    background: rgba(212,175,55,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.transaction-details {
    flex: 1;
}

.transaction-title {
    color: var(--text);
    font-weight: 600;
    margin-bottom: 4px;
}

.transaction-date {
    color: var(--muted);
    font-size: 12px;
}

.transaction-amount {
    font-weight: 700;
    font-size: 14px;
}

.transaction-amount.positive {
    color: #2ecc71;
}

.transaction-amount.negative {
    color: #e74c3c;
}

.balance-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 5px;
}
</style>

<script>
function showSendModal() {
    alert('Send functionality would open here');
}

function showReceiveModal() {
    alert('Receive address would be shown here');
}

function showSwapModal() {
    alert('Swap functionality would open here');
}
</script>
