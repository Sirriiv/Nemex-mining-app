<div id="wallet" class="section">
    <h2>💰 Wallet</h2>
    <p>Manage your assets and NMXp balance and transaction history</p>
    <div class="wallet-balance">
        <h3>Total Balance</h3>
        <div class="balance-amount" id="walletBalance">0 NMXp</div>
    </div>
    <div class="transaction-history">
        <h3>Recent Transactions</h3>
        <div class="transactions-list">
            <div class="transaction-item">
                <div class="transaction-details">
                    <span class="transaction-type">Mining Reward</span>
                    <span class="transaction-date">Today</span>
                </div>
                <div class="transaction-amount positive">+30 NMXp</div>
            </div>
            <div class="transaction-item">
                <div class="transaction-details">
                    <span class="transaction-type">Daily Check-in</span>
                    <span class="transaction-date">Yesterday</span>
                </div>
                <div class="transaction-amount positive">+10 NMXp</div>
            </div>
        </div>
    </div>
</div>
