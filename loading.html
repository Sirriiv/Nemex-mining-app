<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NemexCoin - Loading</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --bg-black: #000000;
            --dark-bg: #0a0a0a;
        }
        
        body {
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        
        .logo {
            font-size: 4rem;
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .loading-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #FFFFFF;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid var(--primary-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 40px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="logo">NMX</div>
    <div class="loading-text">Loading NEMEXCOIN...</div>
    <div class="spinner"></div>

    <script>
        // Simulate loading process
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 3000);
    </script>
</body>
</html>
