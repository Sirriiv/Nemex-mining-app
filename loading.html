<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NemexCoin - Loading</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --bg-black: #000000;
        }
        
        body {
            background-color: var(--bg-black);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5rem;
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        .loading-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #CCC;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid var(--primary-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1A1A;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        
        .nav-item {
            color: #CCC;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="logo">NMX</div>
    <div class="loading-text">Initializing your account...</div>
    <div class="spinner"></div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="#" class="nav-item">HOME</a>
        <a href="#" class="nav-item">TASKS</a>
        <a href="#" class="nav-item">BUY</a>
        <a href="#" class="nav-item">REFERRALS</a>
        <a href="#" class="nav-item">WALLET</a>
    </div>

    <script>
        // Simulate loading process
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 3000);
    </script>
</body>
</html>
