<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN - Loading</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --bg-black: #0a0a0a;
        }
        
        body {
            background-color: var(--bg-black);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        
        .logo {
            font-size: 5rem;
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
        }
        
        .loading-text {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #FFFFFF;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid var(--primary-gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 40px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: var(--primary-gold);
            width: 0%;
            animation: progress 3s linear forwards;
        }
        
        @keyframes progress {
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="logo">NMX</div>
    <div class="loading-text">Loading NEMEXCOIN...</div>
    <div class="spinner"></div>
    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <script>
        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 2000);
    </script>
</body>
</html>
