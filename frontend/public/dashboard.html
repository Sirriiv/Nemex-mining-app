<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NemexCoin - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/components/nav.css">
    <link rel="stylesheet" href="css/components/models.css">
    <link rel="stylesheet" href="css/components/security.css">
</head>
<body>
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Main Dashboard -->
    <div class="dashboard-container">
        <div class="sidebar" id="sidebar"></div>
        
        <div class="main-content">
            <div class="header">
                <h2>Dashboard</h2>
                <div class="header-actions">
                    <button class="btn btn-outline" id="refresh-btn">Refresh Data</button>
                </div>
            </div>
            
            <!-- Stats Cards -->
            <div class="stats-cards" id="stats-cards"></div>
            
            <!-- Mining Section -->
            <div class="mining-section">
                <div class="mining-status" id="mining-status"></div>
                <div class="recent-activity" id="recent-activity"></div>
            </div>
            
            <!-- Charts Section -->
            <div class="charts-section" id="charts-section"></div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <script type="module" src="js/modules/navigation.js"></script>
    <script type="module" src="js/modules/user.js"></script>
    <script type="module" src="js/modules/api.js"></script>
    <script type="module" src="js/modules/utils.js"></script>
    <script type="module" src="js/modules/settings.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
