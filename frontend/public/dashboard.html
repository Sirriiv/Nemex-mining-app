<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN</title>
    <style>
        /* EMBEDDED CSS - NO PATH ISSUES! */
        :root { 
            --dark-bg: #0f0f0f; --darker-bg: #080808; --gold: #d4af37; 
            --text: #f5f5f5; --muted: #aaa; --error: #e74c3c; 
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:var(--dark-bg);color:var(--text);max-width:400px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
        
        .header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid #333;background:var(--darker-bg)}
        .logo{font-weight:700;color:var(--gold);font-size:18px;letter-spacing:1px}
        
        .dashboard{text-align:center;padding:40px 20px;}
        .balance{font-size:52px;font-weight:700;margin:20px 0;color:var(--gold);text-shadow:0 0 20px rgba(212,175,55,0.3)}
        .timer{font-size:14px;color:var(--muted);margin:10px 0;letter-spacing:1px}
        .claim-btn{background:linear-gradient(135deg,var(--gold),#b8941f);color:var(--darker-bg);border:none;padding:14px 40px;border-radius:25px;font-size:16px;font-weight:600;margin:20px 0;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
        
        .bottom-navbar{position:fixed;bottom:0;left:0;right:0;height:72px;background:linear-gradient(180deg,var(--darker-bg)0%,#1a1a1a 100%);border-top:1px solid rgba(212,175,55,0.3);display:flex;justify-content:space-around;align-items:center;padding:0 8px;z-index:1000;max-width:400px;margin:0 auto}
        .nav-item{display:flex;flex-direction:column;align-items:center;padding:10px;color:#666;background:none;border:none;cursor:pointer}
        .nav-item.active{color:var(--gold)}
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">NEMEXCOIN</div>
        <div class="settings-icon">⚙️</div>
    </div>

    <!-- Main Content -->
    <div class="dashboard">
        <div class="balance" id="balanceDisplay">00</div>
        <div class="timer" id="timerDisplay">Claim in 24:00:00</div>
        <button class="claim-btn" id="claimButton" disabled>30 NMXp</button>
    </div>

    <!-- Navigation -->
    <nav class="bottom-navbar">
        <button class="nav-item active">🏠 Home</button>
        <button class="nav-item">📋 Tasks</button>
        <button class="nav-item">🛒 Buy</button>
        <button class="nav-item">👥 Referrals</button>
        <button class="nav-item">💰 Wallet</button>
    </nav>

    <script>
        // SIMPLE JAVASCRIPT - NO MODULE ISSUES!
        console.log('🚀 Dashboard loaded!');
        
        // Simple navigation
        document.querySelectorAll('.nav-item').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                
                if(!this.textContent.includes('Home')) {
                    alert(this.textContent + ' section coming soon!');
                }
            });
        });
        
        // Mining timer
        let seconds = 24 * 60 * 60;
        const timerDisplay = document.getElementById('timerDisplay');
        
        function updateTimer() {
            if (seconds > 0) {
                seconds--;
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                timerDisplay.textContent = `Claim in ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }
        
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
