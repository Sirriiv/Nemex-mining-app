<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN - Dashboard</title>
    <style>
        /* Gold and Black Theme */
        :root {
            --dark-bg: #0a0a0a;
            --darker-bg: #050505;
            --gold: #FFD700;
            --gold-dark: #b8941f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --muted: #888888;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: var(--darker-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }
        
        .logo {
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .settings-icon {
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Main Content */
        .main-content {
            padding: 0 20px;
        }
        
        /* 00 Display Above Coin */
        .points-display {
            text-align: center;
            padding: 30px 20px 10px 20px;
        }
        
        .points-amount {
            color: var(--gold);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        /* NemexCoin Logo - YOUR ORIGINAL CODE */
        .nemex-logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }
        
        .logo-base {
            width: 100%;
            height: 100%;
            background: var(--darker-bg);
            border-radius: 50%;
            border: 3px solid var(--gold);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1), 0 0 30px rgba(212, 175, 55, 0.2);
        }
        
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
        }
        
        .infinity-symbol {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .infinity-symbol::before, .infinity-symbol::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            border-top-color: transparent;
            border-left-color: transparent;
            animation: rotate 8s linear infinite;
        }
        
        .infinity-symbol::before {
            top: 0;
            left: 0;
            transform: rotate(45deg);
            animation-delay: 0s;
        }
        
        .infinity-symbol::after {
            bottom: 0;
            right: 0;
            transform: rotate(225deg);
            animation-delay: -4s;
        }
        
        .circuit-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .circuit-line {
            position: absolute;
            background: var(--gold);
            opacity: 0.6;
        }
        
        .circuit-line:nth-child(1) {
            top: 20%;
            left: 10%;
            width: 15px;
            height: 2px;
            transform: rotate(30deg);
        }
        
        .circuit-line:nth-child(2) {
            top: 30%;
            right: 15%;
            width: 12px;
            height: 2px;
            transform: rotate(-45deg);
        }
        
        .circuit-line:nth-child(3) {
            bottom: 25%;
            left: 20%;
            width: 18px;
            height: 2px;
            transform: rotate(15deg);
        }
        
        .circuit-line:nth-child(4) {
            bottom: 15%;
            right: 10%;
            width: 10px;
            height: 2px;
            transform: rotate(-60deg);
        }
        
        .circuit-line:nth-child(5) {
            top: 45%;
            left: 5%;
            width: 8px;
            height: 2px;
            transform: rotate(75deg);
        }
        
        .circuit-pad {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.8;
        }
        
        .circuit-pad:nth-child(6) {
            top: 15%;
            left: 25%;
        }
        
        .circuit-pad:nth-child(7) {
            top: 35%;
            right: 20%;
        }
        
        .circuit-pad:nth-child(8) {
            bottom: 40%;
            left: 15%;
        }
        
        .circuit-pad:nth-child(9) {
            bottom: 20%;
            right: 30%;
        }
        
        .logo-glow {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(212, 175, 55, 0) 70%);
            animation: glowPulse 3s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* Countdown Timer */
        .countdown-timer {
            background: var(--darker-bg);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin: 0 0 20px 0;
            text-align: center;
        }
        
        .timer-label {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .timer-display {
            color: var(--gold);
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        /* Balance Display */
        .balance-display {
            text-align: center;
            padding: 20px;
            background: var(--darker-bg);
            margin: 0 0 20px 0;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .balance-amount {
            color: var(--gold);
            font-size: 32px;
            font-weight: bold;
        }
        
        /* Claim Button */
        .claim-btn {
            background: linear-gradient(135deg, var(--gold), #b8941f);
            color: var(--darker-bg);
            border: none;
            padding: 16px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            width: 100%;
            margin-bottom: 30px;
        }
        
        .claim-btn:active {
            transform: scale(0.95);
        }
        
        .claim-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--darker-bg);
            border-top: 2px solid var(--gold);
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 5px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }
        
        .nav-btn.active {
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .nav-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .nav-text {
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header with Settings Icon -->
    <header class="header">
        <div class="logo">NEMEXCOIN</div>
        <div class="settings-icon">⚙️</div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- 00 Points Above Coin -->
        <div class="points-display">
            <div class="points-amount">00</div>
        </div>

        <!-- NemexCoin Logo -->
        <div class="nemex-logo">
            <div class="logo-container">
                <div class="logo-base">
                    <div class="logo-center">
                        <div class="infinity-symbol"></div>
                    </div>
                    <div class="circuit-lines">
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-line"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                        <div class="circuit-pad"></div>
                    </div>
                </div>
                <div class="logo-glow"></div>
            </div>
        </div>

        <!-- Countdown Timer -->
        <div class="countdown-timer">
            <div class="timer-label">Claim in</div>
            <div class="timer-display" id="countdownTimer">24:00:00</div>
        </div>

        <!-- Balance Display -->
        <div class="balance-display">
            <div class="balance-amount">30 NMXp</div>
        </div>

        <!-- Claim Button -->
        <button class="claim-btn" id="claimButton" disabled>
            Claim Your NMX
        </button>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-section="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">HOME</span>
        </button>
        <button class="nav-btn" data-section="tasks">
            <span class="nav-icon">📋</span>
            <span class="nav-text">TASKS</span>
        </button>
        <button class="nav-btn" data-section="buy">
            <span class="nav-icon">🛒</span>
            <span class="nav-text">BUY</span>
        </button>
        <button class="nav-btn" data-section="referrals">
            <span class="nav-icon">👥</span>
            <span class="nav-text">REFERRALS</span>
        </button>
        <button class="nav-btn" data-section="wallet">
            <span class="nav-icon">💰</span>
            <span class="nav-text">WALLET</span>
        </button>
    </nav>

    <script>
        // Countdown Timer Functionality
        let countdownTime = 24 * 60 * 60; // 24 hours in seconds
        
        function startCountdown() {
            const timer = setInterval(() => {
                if (countdownTime > 0) {
                    countdownTime--;
                    updateTimerDisplay(countdownTime);
                } else {
                    clearInterval(timer);
                    enableClaimButton();
                }
            }, 1000);
        }
        
        function updateTimerDisplay(seconds) {
            const timerDisplay = document.getElementById('countdownTimer');
            if (timerDisplay) {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                timerDisplay.textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }
        
        function enableClaimButton() {
            const claimButton = document.getElementById('claimButton');
            if (claimButton) {
                claimButton.disabled = false;
                claimButton.textContent = 'Claim Your NMX Now!';
            }
        }
        
        // Navigation
        const navButtons = document.querySelectorAll('.nav-btn');
        navButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                navButtons.forEach(btn => btn.classList.remove('active'));
                // Add active class to clicked button
                this.classList.add('active');
                
                const section = this.getAttribute('data-section');
                alert(`Loading ${section} section...`);
            });
        });
        
        // Claim Button
        const claimButton = document.getElementById('claimButton');
        if (claimButton) {
            claimButton.addEventListener('click', function() {
                if (!this.disabled) {
                    alert('NMX claimed successfully!');
                    this.disabled = true;
                    this.textContent = 'Claim Your NMX';
                    countdownTime = 24 * 60 * 60;
                    startCountdown();
                }
            });
        }
        
        // Settings Icon
        const settingsIcon = document.querySelector('.settings-icon');
        if (settingsIcon) {
            settingsIcon.addEventListener('click', function() {
                alert('Settings menu will open here');
            });
        }
        
        // Start the countdown when page loads
        startCountdown();
    </script>
</body>
</html>
