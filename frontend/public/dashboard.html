<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN - Dashboard</title>
    <style>
        /* Gold and Black Theme */
        :root {
            --dark-bg: #0a0a0a;
            --darker-bg: #050505;
            --gold: #FFD700;
            --gold-dark: #b8941f;
            --text: #ffffff;
            --text-secondary: #cccccc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: var(--darker-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }
        
        .logo {
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .settings-icon {
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Balance at Center Top */
        .balance-top {
            text-align: center;
            padding: 25px 20px 10px 20px;
            background: var(--darker-bg);
            margin-bottom: 10px;
        }
        
        .balance-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            color: var(--gold);
            font-size: 32px;
            font-weight: bold;
        }
        
        .balance-usd {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* Main Content */
        .main-content {
            padding: 0 20px;
        }
        
        /* Countdown Timer - Centered */
        .countdown-timer {
            background: var(--darker-bg);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 25px 20px;
            margin: 20px 0;
            text-align: center;
        }
        
        .timer-label {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .timer-display {
            color: var(--gold);
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }
        
        /* Claim Button */
        .claim-btn {
            background: linear-gradient(135deg, var(--gold), #ffb300);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 20px 0 30px 0;
            transition: all 0.3s ease;
        }
        
        .claim-btn:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
        }
        
        /* Mining Coin - Centered */
        .mining-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .coin-container {
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }
        
        .mining-coin {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #fff9c4, var(--gold), #ffb300);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: #000;
            border: 5px solid var(--gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mining-coin:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px rgba(255, 215, 0, 1);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--darker-bg);
            border-top: 2px solid var(--gold);
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 5px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }
        
        .nav-btn.active {
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .nav-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .nav-text {
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header with Settings Icon -->
    <header class="header">
        <div class="logo">NEMEXCOIN</div>
        <div class="settings-icon">⚙️</div>
    </header>

    <!-- Balance at Center Top -->
    <div class="balance-top">
        <div class="balance-label">Your NMX Balance</div>
        <div class="balance-amount">30 NMX</div>
        <div class="balance-usd">≈ $0.00 USD</div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Countdown Timer -->
        <div class="countdown-timer">
            <div class="timer-label">Claim in</div>
            <div class="timer-display" id="countdownTimer">24:00:00</div>
        </div>

        <!-- Claim Button -->
        <button class="claim-btn" id="claimButton" disabled>
            Claim Your NMX
        </button>

        <!-- Mining Coin - Centered -->
        <div class="mining-section">
            <div class="coin-container">
                <div class="mining-coin" id="miningCoin">
                    NMX
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-section="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">HOME</span>
        </button>
        <button class="nav-btn" data-section="tasks">
            <span class="nav-icon">📋</span>
            <span class="nav-text">TASKS</span>
        </button>
        <button class="nav-btn" data-section="buy">
            <span class="nav-icon">🛒</span>
            <span class="nav-text">BUY</span>
        </button>
        <button class="nav-btn" data-section="referrals">
            <span class="nav-icon">👥</span>
            <span class="nav-text">REFERRALS</span>
        </button>
        <button class="nav-btn" data-section="wallet">
            <span class="nav-icon">💰</span>
            <span class="nav-text">WALLET</span>
        </button>
    </nav>

    <script>
        // Countdown Timer Functionality
        let countdownTime = 24 * 60 * 60; // 24 hours in seconds
        
        function startCountdown() {
            const timer = setInterval(() => {
                if (countdownTime > 0) {
                    countdownTime--;
                    updateTimerDisplay(countdownTime);
                } else {
                    clearInterval(timer);
                    enableClaimButton();
                }
            }, 1000);
        }
        
        function updateTimerDisplay(seconds) {
            const timerDisplay = document.getElementById('countdownTimer');
            if (timerDisplay) {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                timerDisplay.textContent = 
                    `${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${secs.toString().padStart(2, '0')}`;
            }
        }
        
        function enableClaimButton() {
            const claimButton = document.getElementById('claimButton');
            if (claimButton) {
                claimButton.disabled = false;
                claimButton.textContent = 'Claim Your NMX Now!';
            }
        }
        
        // Mining Coin Click Effect
        const miningCoin = document.getElementById('miningCoin');
        if (miningCoin) {
            miningCoin.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);
            });
        }
        
        // Navigation
        const navButtons = document.querySelectorAll('.nav-btn');
        navButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                navButtons.forEach(btn => btn.classList.remove('active'));
                // Add active class to clicked button
                this.classList.add('active');
                
                const section = this.getAttribute('data-section');
                alert(`Loading ${section} section...`);
            });
        });
        
        // Claim Button
        const claimButton = document.getElementById('claimButton');
        if (claimButton) {
            claimButton.addEventListener('click', function() {
                if (!this.disabled) {
                    alert('NMX claimed successfully!');
                    this.disabled = true;
                    this.textContent = 'Claim Your NMX';
                    countdownTime = 24 * 60 * 60;
                    startCountdown();
                }
            });
        }
        
        // Settings Icon
        const settingsIcon = document.querySelector('.settings-icon');
        if (settingsIcon) {
            settingsIcon.addEventListener('click', function() {
                alert('Settings menu will open here');
            });
        }
        
        // Start the countdown when page loads
        startCountdown();
    </script>
</body>
</html>
