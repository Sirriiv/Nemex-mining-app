<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NemexCoin - Dashboard</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --dark-gold: #B8860B;
            --light-gold: #FFF8DC;
            --bg-black: #0A0A0A;
            --dark-gray: #1A1A1A;
            --medium-gray: #2D2D2D;
            --light-gray: #404040;
            --text-light: #FFFFFF;
            --text-gray: #A0A0A0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-black);
            color: var(--text-light);
            line-height: 1.6;
        }
        
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-gray);
            padding: 30px 0;
            border-right: 2px solid var(--dark-gold);
        }
        
        .logo {
            padding: 0 25px 30px;
            border-bottom: 1px solid var(--light-gray);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-gold);
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            background: var(--bg-black);
        }
        
        .header h2 {
            font-size: 2.2rem;
            color: var(--primary-gold);
            margin-bottom: 30px;
        }
        
        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--dark-gray);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--light-gray);
            border-top: 3px solid var(--primary-gold);
        }
        
        .card h3 {
            color: var(--text-gray);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-gold);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h1>NEMEXCOIN</h1>
            </div>
            <!-- We'll add navigation later -->
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h2>Dashboard</h2>
            </div>
            
            <!-- Stats Cards -->
            <div class="stats-cards">
                <div class="card">
                    <h3>TOTAL NMXp EARNED</h3>
                    <div class="value">0 NMXp</div>
                </div>
                <div class="card">
                    <h3>MINING POWER</h3>
                    <div class="value">1.2 KH/s</div>
                </div>
                <div class="card">
                    <h3>DAYS MINING</h3>
                    <div class="value">1 day</div>
                </div>
                <div class="card">
                    <h3>REFERRALS</h3>
                    <div class="value">0 users</div>
                </div>
            </div>
            
            <div style="color: var(--text-gray); text-align: center; margin-top: 50px;">
                <p>Dashboard is loading... Check console for errors (F12)</p>
            </div>
        </div>
    </div>

    <script>
        console.log('Dashboard loaded - testing basic functionality');
    </script>
</body>
</html>
