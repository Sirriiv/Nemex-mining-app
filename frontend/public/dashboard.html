<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN - Dashboard</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components/nav.css">
    <link rel="stylesheet" href="../css/components/modals.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="../css/notification.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="loading-logo">NMX</div>
        <div class="loading-status">Loading NEMEXCOIN...</div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container hidden">
        <!-- Header with Settings -->
        <div class="header">
            <div class="logo">NEMEXCOIN</div>
            <div class="header-actions">
                <div class="settings-icon" id="settingsButton">⚙️</div>
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Sections will be loaded here dynamically -->
            <div id="section-container"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-navbar">
            <button class="nav-item active" data-section="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </button>
            <button class="nav-item" data-section="tasks">
                <div class="nav-icon">📋</div>
                <div class="nav-label">Tasks</div>
            </button>
            <button class="nav-item" data-section="buy">
                <div class="nav-icon">🛒</div>
                <div class="nav-label">Buy</div>
            </button>
            <button class="nav-item" data-section="referrals">
                <div class="nav-icon">👥</div>
                <div class="nav-label">Referrals</div>
            </button>
            <button class="nav-item" data-section="wallet">
                <div class="nav-icon">💰</div>
                <div class="nav-label">Wallet</div>
            </button>
        </nav>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-item" onclick="openSection('profile')">
            <div class="settings-icon-small">👤</div>
            <div class="settings-label">Profile</div>
        </div>
        <div class="settings-item" onclick="openSection('notifications')">
            <div class="settings-icon-small">🔔</div>
            <div class="settings-label">Notifications</div>
        </div>
        <div class="settings-item" onclick="openSection('security')">
            <div class="settings-icon-small">🔒</div>
            <div class="settings-label">Security</div>
        </div>
        <div class="settings-item" onclick="toggleDarkMode()">
            <div class="settings-icon-small">🌙</div>
            <div class="settings-label">Dark Mode</div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item" onclick="openSection('help')">
            <div class="settings-icon-small">❓</div>
            <div class="settings-label">Help & Support</div>
        </div>
        <div class="settings-item" onclick="openSection('about')">
            <div class="settings-icon-small">ℹ️</div>
            <div class="settings-label">About</div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item logout-btn" onclick="logout()">
            <div class="settings-icon-small">🚪</div>
            <div class="settings-label">Logout</div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/main.js"></script>
    <script src="../js/modules/navigation.js"></script>
    <script src="../js/modules/api.js"></script>
    <script src="../js/modules/user.js"></script>
    <script src="../js/modules/core.js"></script>
    <script src="../js/modules/utils.js"></script>
    <script src="../js/modules/profileManager.js"></script>
    
    <!-- Section Scripts (will be loaded dynamically) -->
</body>
</html>
