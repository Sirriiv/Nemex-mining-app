<!DOCTYPE html>
<html>
<head>

<title>NEMEXCOIN</title>
<style>
:root { --dark-bg: #0f0f0f; --darker-bg: #080808; --gold: #d4af37; --text: #f5f5f5; }

.bottom-navbar { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: #080808; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; max-width: 400px; margin: 0 auto; }
.nav-item { display: flex; flex-direction: column; align-items: center; padding: 10px; color: #666; }
.nav-item.active { color: #d4af37; }
