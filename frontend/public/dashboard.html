<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMEXCOIN - Dashboard</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components/nav.css">
    <link rel="stylesheet" href="../css/components/modals.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="loading-logo">NMX</div>
        <div class="loading-status">Loading NEMEXCOIN...</div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container hidden">
        <!-- Header -->
        <header class="header">
            <div class="logo">NEMEXCOIN</div>
            <div class="header-actions">
                <div class="settings-icon" id="settingsButton">⚙️</div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <div id="section-container">
                <!-- Home Section (Default) -->
                <div class="section home-section active" id="home-section">
                    <!-- Mining Coin -->
                    <div class="mining-section">
                        <div class="coin-container">
                            <div class="mining-coin" id="miningCoin">
                                NMX
                            </div>
                        </div>
                    </div>

                    <!-- Countdown Timer -->
                    <div class="countdown-timer">
                        <div class="timer-label">Claim in</div>
                        <div class="timer-display" id="countdownTimer">24:00:00</div>
                    </div>

                    <!-- Claim Button -->
                    <button class="claim-btn" id="claimButton" disabled>
                        Claim Your NMX
                    </button>

                    <!-- Balance Display -->
                    <div class="balance-display">
                        <div class="balance-label">Your NMX Balance</div>
                        <div class="balance-amount">30 NMX</div>
                        <div class="balance-usd">≈ $0.00 USD</div>
                    </div>

                    <!-- Bottom Navigation -->
                    <nav class="bottom-nav">
                        <button class="nav-btn active" data-section="home">
                            <span class="nav-icon">🏠</span>
                            <span class="nav-text">HOME</span>
                        </button>
                        <button class="nav-btn" data-section="tasks">
                            <span class="nav-icon">📋</span>
                            <span class="nav-text">TASKS</span>
                        </button>
                        <button class="nav-btn" data-section="buy">
                            <span class="nav-icon">🛒</span>
                            <span class="nav-text">BUY</span>
                        </button>
                        <button class="nav-btn" data-section="referrals">
                            <span class="nav-icon">👥</span>
                            <span class="nav-text">REFERRALS</span>
                        </button>
                        <button class="nav-btn" data-section="wallet">
                            <span class="nav-icon">💰</span>
                            <span class="nav-text">WALLET</span>
                        </button>
                    </nav>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/main.js"></script>
    <script src="../js/modules/navigation.js"></script>
    <script src="../js/modules/api.js"></script>
    <script src="../js/modules/user.js"></script>
    <script src="../js/modules/core.js"></script>
    <script src="../js/modules/utils.js"></script>

    <script>
        // Simple initialization
        setTimeout(function() {
            const loading = document.getElementById('loading');
            const app = document.getElementById('app');
            
            if (loading && app) {
                loading.classList.add('hidden');
                app.classList.remove('hidden');
            }
        }, 2000);
    </script>
</body>
</html>
